<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patronize — Reserveer een tafel</title>
    <style>
      /*
    Patronize — embeddable reservation widget.

    Two visual states drive everything:
      - data-state="closed" → only the launcher pill is rendered.
      - data-state="open"   → launcher + booking panel.

    Both states post a `{source:'patronize', type:'state', state}` message
    to the parent so the loader script can resize the iframe accordingly.
    Inline iframe embeds work too: if the iframe is sized to fit both,
    clicking the launcher just expands the panel within it.

    A `?open=1` query param starts the widget already open — useful for
    in-app previews that want to demo the form right away.
  */
      :root {
        --bg: #141414;
        --surface: #1c1c1d;
        --surface-2: #232325;
        --surface-3: #2c2c2e;
        --border: rgba(255, 255, 255, 0.06);
        --text: #f5f5f5;
        --text-muted: #a3a3a3;
        --text-dim: #737373;
        --brand: #ea580c;
        --brand-bright: #fb923c;
        --danger: #f87171;
        --ok: #34d399;
        --shadow-panel: 0 12px 40px -12px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        --shadow-launcher: 0 8px 24px -8px rgba(234, 88, 12, 0.6),
          0 0 14px -4px rgba(249, 115, 22, 0.32);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --surface: #ffffff;
          --surface-2: #f1f5f9;
          --surface-3: #e2e8f0;
          --border: #e2e8f0;
          --text: #0f172a;
          --text-muted: #475569;
          --text-dim: #94a3b8;
          --shadow-panel: 0 12px 32px -12px rgba(15, 23, 42, 0.18);
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        overflow: hidden;
        height: 100%;
      }

      /* The launcher pill — always anchored at the bottom of the iframe. */
      .launcher {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 8px;
        height: 48px;
        border: 0;
        border-radius: 999px;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-weight: 500;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: var(--shadow-launcher);
        transition: filter 0.15s, transform 0.1s;
      }
      .launcher:hover {
        filter: brightness(1.08);
      }
      .launcher:active {
        transform: translateY(1px);
      }
      .launcher .chevron {
        display: inline-block;
        transition: transform 0.2s ease;
      }
      body[data-state="open"] .launcher .chevron {
        transform: rotate(180deg);
      }
      .launcher svg {
        display: block;
      }

      /* The expanded panel — sits above the launcher when state is open. */
      .panel {
        position: absolute;
        top: 8px;
        left: 8px;
        right: 8px;
        bottom: 64px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px 18px 16px;
        box-shadow: var(--shadow-panel);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        /* Smooth in/out transition. CSS only — no JS animation needed. */
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      body[data-state="open"] .panel {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .panel-close {
        position: absolute;
        top: 8px;
        right: 10px;
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--text-muted);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
      }
      .panel-close:hover {
        background: var(--surface-2);
        color: var(--text);
      }

      h1 {
        font-size: 18px;
        font-weight: 500;
        margin: 0 0 4px 0;
        color: var(--text);
      }
      .subtitle {
        font-size: 13px;
        color: var(--text-muted);
        margin: 0 0 14px 0;
      }
      .step-label {
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin: 12px 0 6px;
      }
      .stepper {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      .stepper button {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font-size: 15px;
        cursor: pointer;
      }
      .stepper button:hover {
        background: var(--surface-3);
      }
      .stepper .count {
        font-size: 15px;
        font-weight: 500;
        min-width: 28px;
        text-align: center;
      }
      input[type="date"],
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      textarea {
        width: 100%;
        padding: 9px 11px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
        font-size: 13px;
      }
      input:focus,
      textarea:focus {
        outline: 2px solid var(--brand);
        outline-offset: -2px;
      }
      textarea {
        resize: vertical;
        min-height: 56px;
      }
      .slots {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
        gap: 6px;
      }
      .slot {
        padding: 8px 4px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        text-align: center;
        cursor: pointer;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        transition: background 0.15s, border-color 0.15s;
      }
      .slot:hover {
        border-color: var(--brand);
      }
      .slot.active {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }
      .slot[disabled] {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .slot[disabled]:hover {
        border-color: var(--border);
      }
      .empty {
        grid-column: 1/-1;
        text-align: center;
        color: var(--text-dim);
        padding: 18px 8px;
        font-size: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .row > * {
        min-width: 0;
      }
      label.field {
        display: block;
        margin-bottom: 6px;
      }
      label.field > .field-label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      .submit {
        width: 100%;
        padding: 11px 16px;
        border-radius: 11px;
        border: 0;
        background: var(--brand);
        color: #fff;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        margin-top: 12px;
        box-shadow: var(--shadow-launcher);
      }
      .submit:hover {
        filter: brightness(1.08);
      }
      .submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .feedback {
        margin-top: 8px;
        padding: 9px 11px;
        border-radius: 9px;
        font-size: 12px;
      }
      .feedback.error {
        background: rgba(248, 113, 113, 0.12);
        color: var(--danger);
      }
      .feedback.ok {
        background: rgba(52, 211, 153, 0.12);
        color: var(--ok);
      }
      .summary {
        color: var(--text-muted);
        font-size: 12px;
      }
      .footer-note {
        margin-top: 12px;
        font-size: 10px;
        color: var(--text-dim);
        text-align: center;
      }
      .hidden {
        display: none !important;
      }

      /* Compact NL/FR/EN switcher in the panel header — sits next
         to the close button. NL is the default. */
      .lang-switch {
        position: absolute;
        top: 12px;
        right: 44px;
        display: inline-flex;
        gap: 1px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .lang-switch button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 3px 7px;
        border-radius: 999px;
        cursor: pointer;
        font: inherit;
      }
      .lang-switch button.active {
        background: var(--surface);
        color: var(--text);
      }
    </style>
  </head>
  <body data-state="closed">
    <!-- Booking panel (rendered above launcher when state=open). -->
    <div class="panel" id="panel" aria-hidden="true">
      <div class="lang-switch" id="lang-switch" role="group" aria-label="Taal">
        <button type="button" data-lang="nl">NL</button>
        <button type="button" data-lang="fr">FR</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <button class="panel-close" id="panel-close" aria-label="Sluit">×</button>

      <div id="step-form">
        <h1 data-i18n="title">Reserveer een tafel</h1>
        <p class="subtitle" data-i18n="subtitle">
          Kies een datum, aantal personen en tijdstip. We houden een tafel voor u.
        </p>

        <div class="step-label" data-i18n="partySize">Aantal personen</div>
        <div class="stepper">
          <button type="button" id="party-minus" aria-label="−">
            −
          </button>
          <span class="count" id="party-count">2</span>
          <button type="button" id="party-plus" aria-label="+">+</button>
          <span class="summary"><span id="party-word">personen</span></span>
        </div>

        <div class="step-label" data-i18n="date">Datum</div>
        <input type="date" id="date" />

        <div class="step-label" data-i18n="time">Tijdstip</div>
        <div class="slots" id="slots">
          <div class="empty" data-i18n="pickDate">Kies een datum om beschikbare tijden te zien.</div>
        </div>

        <div class="step-label" data-i18n="yourDetails">Uw gegevens</div>
        <label class="field">
          <span class="field-label" data-i18n="name">Naam</span>
          <input type="text" id="name" autocomplete="name" required />
        </label>
        <div class="row">
          <label class="field">
            <span class="field-label" data-i18n="email">E-mail</span>
            <input type="email" id="email" autocomplete="email" />
          </label>
          <label class="field">
            <span class="field-label" data-i18n="phone">Telefoon</span>
            <input type="tel" id="phone" autocomplete="tel" />
          </label>
        </div>
        <label class="field">
          <span class="field-label" data-i18n="notes">Opmerkingen / allergieën (optioneel)</span>
          <textarea
            id="notes"
            data-i18n-placeholder="notesPlaceholder"
            placeholder="Iets wat we moeten weten?"
          ></textarea>
        </label>

        <button class="submit" id="submit" type="button" data-i18n="book">Reserveer</button>
        <div id="feedback"></div>
      </div>

      <div id="step-success" class="hidden">
        <h1 data-i18n="confirmed">Reservatie bevestigd</h1>
        <div class="feedback ok" id="success-msg" style="margin-top: 8px"></div>
        <button class="submit" id="another" type="button" data-i18n="another">
          Maak nog een reservatie
        </button>
      </div>

      <div class="footer-note" data-i18n="poweredBy">Aangedreven door Patron</div>
    </div>

    <!-- Launcher — visible in both states; opens/closes the panel. -->
    <button
      class="launcher"
      id="launcher"
      type="button"
      aria-label="Reserveer"
      aria-expanded="false"
    >
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <rect x="3" y="4.5" width="18" height="16" rx="2" />
        <path d="M3 9h18" />
        <path d="M8 3v3" />
        <path d="M16 3v3" />
      </svg>
      <span data-i18n="launcher">Reserveer</span>
      <span class="chevron" aria-hidden="true">▴</span>
    </button>

    <script>
      (function () {
        var qs = new URLSearchParams(location.search);
        var API = qs.get("api") || "";
        var initOpen = qs.has("open");
        function url(path) {
          return API.replace(/\/$/, "") + path;
        }

        // ── Inline i18n. NL is the default. Caller can override via
        // ?lang=nl|fr|en (the loader script forwards the host site's
        // <html lang> when present). Falls back to localStorage and
        // finally NL.
        var I18N_KEY = "patronize.lang";
        var SUPPORTED = ["nl", "fr", "en"];
        var TRANSLATIONS = {
          nl: {
            "title":            "Reserveer een tafel",
            "subtitle":         "Kies een datum, aantal personen en tijdstip. We houden een tafel voor u.",
            "partySize":        "Aantal personen",
            "date":             "Datum",
            "time":             "Tijdstip",
            "yourDetails":      "Uw gegevens",
            "name":             "Naam",
            "email":            "E-mail",
            "phone":            "Telefoon",
            "notes":            "Opmerkingen / allergieën (optioneel)",
            "notesPlaceholder": "Iets wat we moeten weten?",
            "book":             "Reserveer",
            "booking":          "Reserveren…",
            "confirmed":        "Reservatie bevestigd",
            "another":          "Maak nog een reservatie",
            "poweredBy":        "Aangedreven door Patron",
            "launcher":         "Reserveer",
            "guest":            "persoon",
            "guests":           "personen",
            "pickDate":         "Kies een datum om beschikbare tijden te zien.",
            "loading":          "Laden…",
            "loadError":        "Kon tijden niet laden. Probeer opnieuw.",
            "closed":           "Gesloten op deze datum.",
            "closedReason":     "Gesloten — {reason}.",
            "noTablesFor":      "Geen tafels vrij voor {n} op deze dag. Probeer een andere datum.",
            "err.name":         "Geef uw naam.",
            "err.time":         "Kies een tijdstip.",
            "err.contact":      "Geef een e-mailadres of telefoonnummer zodat we u kunnen bereiken.",
            "err.generic":      "Er ging iets mis. Probeer opnieuw.",
            "success.line":     "Het is geboekt, {name}. Tot {when} voor {n} {word}.",
          },
          fr: {
            "title":            "Réserver une table",
            "subtitle":         "Choisissez la date, le nombre de personnes et l'heure. Nous gardons une table pour vous.",
            "partySize":        "Nombre de personnes",
            "date":             "Date",
            "time":             "Heure",
            "yourDetails":      "Vos coordonnées",
            "name":             "Nom",
            "email":            "E-mail",
            "phone":            "Téléphone",
            "notes":            "Notes / allergies (optionnel)",
            "notesPlaceholder": "Quelque chose à signaler ?",
            "book":             "Réserver",
            "booking":          "Réservation…",
            "confirmed":        "Réservation confirmée",
            "another":          "Faire une autre réservation",
            "poweredBy":        "Propulsé par Patron",
            "launcher":         "Réserver",
            "guest":            "personne",
            "guests":           "personnes",
            "pickDate":         "Choisissez une date pour voir les heures disponibles.",
            "loading":          "Chargement…",
            "loadError":        "Impossible de charger les heures. Veuillez réessayer.",
            "closed":           "Fermé à cette date.",
            "closedReason":     "Fermé — {reason}.",
            "noTablesFor":      "Aucune table libre pour {n} ce jour-là. Essayez une autre date.",
            "err.name":         "Veuillez saisir votre nom.",
            "err.time":         "Veuillez choisir une heure.",
            "err.contact":      "Donnez un e-mail ou un numéro de téléphone pour qu'on puisse vous joindre.",
            "err.generic":      "Une erreur s'est produite. Veuillez réessayer.",
            "success.line":     "C'est réservé, {name}. À {when} pour {n} {word}.",
          },
          en: {
            "title":            "Reserve a table",
            "subtitle":         "Pick a date, party size, and time. We'll hold a table for you.",
            "partySize":        "Party size",
            "date":             "Date",
            "time":             "Time",
            "yourDetails":      "Your details",
            "name":             "Name",
            "email":            "Email",
            "phone":            "Phone",
            "notes":            "Notes / allergies (optional)",
            "notesPlaceholder": "Anything we should know?",
            "book":             "Reserve",
            "booking":          "Reserving…",
            "confirmed":        "Reservation confirmed",
            "another":          "Make another reservation",
            "poweredBy":        "Powered by Patron",
            "launcher":         "Make a reservation",
            "guest":            "guest",
            "guests":           "guests",
            "pickDate":         "Pick a date to see available times.",
            "loading":          "Loading…",
            "loadError":        "Couldn\u2019t load times. Please retry.",
            "closed":           "Closed on this date.",
            "closedReason":     "Closed — {reason}.",
            "noTablesFor":      "No tables free for {n} on this day. Try another date.",
            "err.name":         "Please enter your name.",
            "err.time":         "Please pick a time.",
            "err.contact":      "Please add an email or phone number so we can reach you.",
            "err.generic":      "Something went wrong. Please try again.",
            "success.line":     "You\u2019re booked, {name}. We\u2019ll see you on {when} for {n} {word}.",
          },
        };
        var lang = (function detectLang() {
          var fromUrl = (qs.get("lang") || "").toLowerCase();
          if (SUPPORTED.indexOf(fromUrl) !== -1) return fromUrl;
          try {
            var saved = localStorage.getItem(I18N_KEY);
            if (saved && SUPPORTED.indexOf(saved) !== -1) return saved;
          } catch (e) { /* ignore */ }
          var nav = (navigator.language || "").toLowerCase();
          if (nav.indexOf("nl") === 0) return "nl";
          return "nl";
        })();
        function t(key, vars) {
          var dict = TRANSLATIONS[lang] || TRANSLATIONS.nl;
          var s = dict[key];
          if (s === undefined) s = (TRANSLATIONS.en && TRANSLATIONS.en[key]) || key;
          if (vars && typeof s === "string") {
            for (var v in vars) {
              s = s.replace(new RegExp("\\{" + v + "\\}", "g"), String(vars[v]));
            }
          }
          return s;
        }
        function applyStaticI18n() {
          document.querySelectorAll("[data-i18n]").forEach(function (el) {
            el.textContent = t(el.getAttribute("data-i18n"));
          });
          document.querySelectorAll("[data-i18n-placeholder]").forEach(function (el) {
            el.placeholder = t(el.getAttribute("data-i18n-placeholder"));
          });
          document.documentElement.setAttribute("lang", lang);
          document.title = "Patronize — " + t("title");
          var sw = document.getElementById("lang-switch");
          if (sw) {
            sw.querySelectorAll("button[data-lang]").forEach(function (b) {
              if (b.getAttribute("data-lang") === lang) b.classList.add("active");
              else b.classList.remove("active");
            });
          }
        }
        function setLang(next) {
          if (SUPPORTED.indexOf(next) === -1) return;
          lang = next;
          try { localStorage.setItem(I18N_KEY, next); } catch (e) {}
          applyStaticI18n();
          // Re-render the bits that aren't tagged with data-i18n.
          if (typeof renderParty === "function") renderParty();
          if (typeof loadAvailability === "function") loadAvailability();
        }
        document.addEventListener("DOMContentLoaded", function () {
          var sw = document.getElementById("lang-switch");
          if (sw) {
            sw.addEventListener("click", function (e) {
              var b = e.target.closest("button[data-lang]");
              if (b) setLang(b.getAttribute("data-lang"));
            });
          }
          applyStaticI18n();
        });
        applyStaticI18n();

        // ----- State -----
        var state = {
          partySize: 2,
          date: "",
          slot: null,
          submitting: false,
        };

        // ----- Elements -----
        var elBody = document.body;
        var elLauncher = document.getElementById("launcher");
        var elPanelClose = document.getElementById("panel-close");
        var elPanel = document.getElementById("panel");
        var elDate = document.getElementById("date");
        var elPartyCount = document.getElementById("party-count");
        var elPartyWord = document.getElementById("party-word");
        var elPartyMinus = document.getElementById("party-minus");
        var elPartyPlus = document.getElementById("party-plus");
        var elSlots = document.getElementById("slots");
        var elSubmit = document.getElementById("submit");
        var elFeedback = document.getElementById("feedback");
        var elName = document.getElementById("name");
        var elEmail = document.getElementById("email");
        var elPhone = document.getElementById("phone");
        var elNotes = document.getElementById("notes");
        var elStepForm = document.getElementById("step-form");
        var elStepSuccess = document.getElementById("step-success");
        var elSuccessMsg = document.getElementById("success-msg");
        var elAnother = document.getElementById("another");

        // ----- Open/close state -----
        function postState(s) {
          try {
            parent.postMessage(
              { source: "patronize", type: "state", state: s },
              "*"
            );
          } catch (e) {
            /* same-origin or sandbox edge cases — ignore */
          }
        }
        function setOpenState(s) {
          elBody.dataset.state = s;
          elLauncher.setAttribute("aria-expanded", String(s === "open"));
          elPanel.setAttribute("aria-hidden", String(s !== "open"));
          postState(s);
        }
        setOpenState(initOpen ? "open" : "closed");

        elLauncher.addEventListener("click", function () {
          setOpenState(elBody.dataset.state === "open" ? "closed" : "open");
        });
        elPanelClose.addEventListener("click", function () {
          setOpenState("closed");
        });

        // ----- Helpers -----
        function isoToday() {
          var d = new Date();
          var y = d.getFullYear();
          var m = String(d.getMonth() + 1).padStart(2, "0");
          var day = String(d.getDate()).padStart(2, "0");
          return y + "-" + m + "-" + day;
        }
        function setFeedback(kind, msg) {
          if (!msg) {
            elFeedback.innerHTML = "";
            return;
          }
          elFeedback.innerHTML =
            '<div class="feedback ' + kind + '">' + msg + "</div>";
        }
        function renderParty() {
          elPartyCount.textContent = state.partySize;
          elPartyWord.textContent = state.partySize === 1 ? t("guest") : t("guests");
        }
        function renderSlots(slots, closed, closureReason) {
          if (closed || !slots || !slots.length) {
            // Escape any reason text the manager typed in Settings.
            var safeReason = (closureReason || "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            elSlots.innerHTML =
              '<div class="empty">' +
              (safeReason
                ? t("closedReason", { reason: safeReason })
                : t("closed")) +
              "</div>";
            return;
          }
          elSlots.innerHTML = "";
          slots.forEach(function (s) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "slot";
            btn.textContent = s.time;
            if (!s.available) btn.disabled = true;
            if (state.slot && state.slot.startsAt === s.startsAt)
              btn.classList.add("active");
            btn.addEventListener("click", function () {
              if (!s.available) return;
              state.slot = s;
              renderSlots(slots);
            });
            elSlots.appendChild(btn);
          });
          if (
            state.slot &&
            !slots.find(function (s) {
              return s.startsAt === state.slot.startsAt;
            })
          ) {
            state.slot = null;
          }
          if (
            !slots.some(function (s) {
              return s.available;
            })
          ) {
            var empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = t("noTablesFor", { n: state.partySize });
            elSlots.appendChild(empty);
          }
        }

        var loadSeq = 0;
        function loadAvailability() {
          if (!state.date) return;
          var seq = ++loadSeq;
          elSlots.innerHTML = '<div class="empty">' + t("loading") + '</div>';
          fetch(
            url(
              "/api/public/reservations/availability?date=" +
                state.date +
                "&partySize=" +
                state.partySize
            )
          )
            .then(function (r) {
              if (!r.ok) throw new Error("Network error");
              return r.json();
            })
            .then(function (j) {
              if (seq !== loadSeq) return;
              renderSlots(j.slots, j.closed, j.closureReason);
            })
            .catch(function () {
              if (seq !== loadSeq) return;
              elSlots.innerHTML =
                '<div class="empty">' + t("loadError") + '</div>';
            });
        }

        // ----- Form wiring -----
        elDate.value = isoToday();
        state.date = elDate.value;
        elDate.addEventListener("change", function () {
          state.date = elDate.value;
          state.slot = null;
          loadAvailability();
        });
        function bumpParty(delta) {
          state.partySize = Math.max(1, Math.min(20, state.partySize + delta));
          renderParty();
          state.slot = null;
          loadAvailability();
        }
        elPartyMinus.addEventListener("click", function () {
          bumpParty(-1);
        });
        elPartyPlus.addEventListener("click", function () {
          bumpParty(1);
        });

        elSubmit.addEventListener("click", function () {
          if (state.submitting) return;
          setFeedback();
          var name = (elName.value || "").trim();
          var email = (elEmail.value || "").trim();
          var phone = (elPhone.value || "").trim();
          var notes = (elNotes.value || "").trim();
          if (!name) return setFeedback("error", t("err.name"));
          if (!state.slot) return setFeedback("error", t("err.time"));
          if (!email && !phone)
            return setFeedback("error", t("err.contact"));

          state.submitting = true;
          elSubmit.disabled = true;
          elSubmit.textContent = t("booking");

          fetch(url("/api/public/reservations"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: name,
              email: email,
              phone: phone,
              partySize: state.partySize,
              startsAt: state.slot.startsAt,
              notes: notes,
            }),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                if (!r.ok)
                  throw new Error(
                    j && j.error ? j.error : "Could not save reservation"
                  );
                return j;
              });
            })
            .then(function (j) {
              var localeMap = { nl: "nl-BE", fr: "fr-BE", en: "en-IE" };
              var when = new Date(j.reservation.startsAt).toLocaleString(
                localeMap[lang] || "nl-BE",
                {
                  weekday: "long",
                  month: "short",
                  day: "numeric",
                  hour: "2-digit",
                  minute: "2-digit",
                }
              );
              elSuccessMsg.textContent = t("success.line", {
                name: name,
                when: when,
                n: state.partySize,
                word: state.partySize === 1 ? t("guest") : t("guests"),
              });
              elStepForm.classList.add("hidden");
              elStepSuccess.classList.remove("hidden");
            })
            .catch(function (e) {
              setFeedback("error", e.message || t("err.generic"));
            })
            .finally(function () {
              state.submitting = false;
              elSubmit.disabled = false;
              elSubmit.textContent = t("book");
            });
        });

        elAnother.addEventListener("click", function () {
          elStepSuccess.classList.add("hidden");
          elStepForm.classList.remove("hidden");
          elName.value = "";
          elEmail.value = "";
          elPhone.value = "";
          elNotes.value = "";
          state.slot = null;
          loadAvailability();
        });

        renderParty();
        loadAvailability();
      })();
    </script>
  </body>
</html>
