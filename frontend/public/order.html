<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order at your table</title>
    <style>
      /*
    Customer QR ordering — the page a guest lands on after scanning the
    QR pinned to their table. Self-contained vanilla JS, dark theme by
    default with prefers-color-scheme awareness. URL contract:

      /order.html?table=<TABLE_ID>

    The page fetches /api/public/menu/:tableId for the menu, lets the
    customer build a cart, and POSTs to .../order to push pending lines
    to the kitchen. The waiter still finalises payment.
  */
      :root {
        --bg: #141414;
        --surface: #1c1c1d;
        --surface-2: #232325;
        --surface-3: #2c2c2e;
        --border: rgba(255, 255, 255, 0.06);
        --text: #f5f5f5;
        --text-muted: #a3a3a3;
        --text-dim: #737373;
        --brand: #ea580c;
        --brand-bright: #fb923c;
        --shadow: 0 12px 32px -12px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --surface: #fff;
          --surface-2: #f1f5f9;
          --surface-3: #e2e8f0;
          --border: #e2e8f0;
          --text: #0f172a;
          --text-muted: #475569;
          --text-dim: #94a3b8;
          --shadow: 0 8px 24px -12px rgba(15, 23, 42, 0.18);
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.5;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px 16px 120px;
      }
      header {
        padding: 8px 0 16px;
      }
      .restaurant {
        font-size: 13px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      h1 {
        font-size: 22px;
        font-weight: 500;
        margin: 4px 0;
      }
      .table-meta {
        font-size: 13px;
        color: var(--text-muted);
      }

      .cats {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 8px 0;
        margin: 0 -16px 0;
        padding-left: 16px;
        padding-right: 16px;
      }
      .cats.parents {
        border-bottom: 1px solid var(--border);
      }
      /* Sub-row sits flush under the parents row, slightly smaller chips
         so the hierarchy is obvious at a glance. */
      .cats.subs {
        margin-bottom: 16px;
        border-bottom: 1px solid var(--border);
        padding-top: 4px;
        padding-bottom: 10px;
      }
      .cats.subs[hidden] { display: none; }
      .cat {
        flex-shrink: 0;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      .cats.subs .cat {
        padding: 5px 10px;
        font-size: 12px;
        background: var(--surface-2);
      }
      .cat.active {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }

      .grid {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 1fr;
      }
      @media (min-width: 640px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      .item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        cursor: pointer;
        text-align: left;
        box-shadow: var(--shadow);
        transition: filter 0.15s, transform 0.05s;
      }

      /* ── Layout: list ───────────────────────────────────────────
         Single-column wider cards. More room for descriptions, price
         a little larger — long-form menu feel. */
      body[data-layout="list"] .grid {
        grid-template-columns: 1fr;
      }
      @media (min-width: 640px) {
        body[data-layout="list"] .grid {
          grid-template-columns: 1fr;
        }
      }
      body[data-layout="list"] .item { padding: 14px 16px; }
      body[data-layout="list"] .item .item-price { font-size: 16px; }

      /* ── Layout: compact ────────────────────────────────────────
         Edge-to-edge dense rows with hairline dividers — printed-
         menu feel. Hides the category badge per row, tightens the
         padding, drops the card chrome entirely. */
      body[data-layout="compact"] .grid {
        grid-template-columns: 1fr;
        gap: 0;
      }
      @media (min-width: 640px) {
        body[data-layout="compact"] .grid {
          grid-template-columns: 1fr;
        }
      }
      body[data-layout="compact"] .item {
        border-radius: 0;
        border: 0;
        border-bottom: 1px solid var(--border);
        box-shadow: none;
        padding: 10px 12px;
      }
      body[data-layout="compact"] .item:hover { filter: none; background: var(--surface-2); }
      body[data-layout="compact"] .cat-tag { display: none; }
      body[data-layout="compact"] .item-name { font-size: 14px; margin-top: 0; }
      body[data-layout="compact"] .item-desc { font-size: 11px; margin-top: 2px; }
      body[data-layout="compact"] .item-price { margin-top: 4px; font-size: 14px; }
      .item:active {
        transform: scale(0.98);
      }
      .item:hover {
        filter: brightness(1.03);
      }
      .cat-tag {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
      }
      .item-name {
        font-weight: 500;
        margin-top: 2px;
        color: white;
      }
      .item-price {
        color: var(--brand-bright);
        font-weight: 500;
        margin-top: 6px;
      }
      .item-desc {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .cart {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        box-shadow: 0 -12px 40px -12px rgba(0, 0, 0, 0.5);
        padding: 12px 16px env(safe-area-inset-bottom);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .cart-meta {
        color: var(--text-muted);
        font-size: 13px;
      }
      .cart-total {
        font-weight: 500;
        color: var(--text);
      }
      .cart-btn {
        background: var(--brand);
        color: #fff;
        border: 0;
        padding: 11px 18px;
        border-radius: 12px;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 8px 24px -10px rgba(234, 88, 12, 0.55);
      }
      .cart-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .sheet {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        z-index: 50;
      }
      .sheet[hidden] {
        display: none;
      }
      .sheet-card {
        width: 100%;
        max-width: 520px;
        background: var(--surface);
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
        padding: 18px 18px env(safe-area-inset-bottom);
        max-height: 90vh;
        overflow-y: auto;
      }
      .sheet-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .sheet-row + .sheet-row {
        margin-top: 10px;
      }
      .stepper {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .stepper button {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font-size: 16px;
        cursor: pointer;
      }
      .step-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin: 12px 0 6px;
      }
      textarea,
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
        font-size: 14px;
      }
      textarea {
        resize: vertical;
        min-height: 60px;
      }
      .size-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .size-btn {
        padding: 9px 6px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        cursor: pointer;
        font-size: 13px;
        text-align: center;
      }
      .size-btn.active {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }

      .lines {
        background: var(--surface-2);
        border-radius: 12px;
        padding: 4px 0;
      }
      .line {
        padding: 8px 12px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        font-size: 14px;
      }
      .line + .line {
        border-top: 1px solid var(--border);
      }
      .qty-pill {
        background: var(--surface-3);
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .empty {
        text-align: center;
        color: var(--text-dim);
        padding: 60px 16px;
      }
      .feedback {
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 10px;
      }
      .feedback.error {
        background: rgba(248, 113, 113, 0.12);
        color: #f87171;
      }
      .feedback.ok {
        background: rgba(52, 211, 153, 0.12);
        color: #34d399;
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="wrap">
      <header>
        <div class="restaurant" id="restaurant">…</div>
        <h1 id="title">Order</h1>
        <div class="table-meta" id="meta"></div>
      </header>

      <div id="loading" class="empty">Loading menu…</div>

      <div id="content" hidden>
        <div class="cats parents" id="cats"></div>
        <div class="cats subs" id="subcats" hidden></div>
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <div class="cart" id="cart" hidden>
      <div>
        <div class="cart-meta"><span id="cart-count">0</span> in cart</div>
        <div class="cart-total" id="cart-total">€0.00</div>
      </div>
      <button class="cart-btn" id="cart-review">Review &amp; send</button>
    </div>

    <!-- Item modifier sheet -->
    <div class="sheet" id="item-sheet" hidden>
      <div class="sheet-card" onclick="event.stopPropagation()">
        <div class="step-label">Item</div>
        <div id="sheet-name" style="font-weight: 500; font-size: 16px"></div>
        <div
          id="sheet-price"
          style="color: var(--brand-bright); font-weight: 500"
        ></div>

        <div id="sheet-sizes-wrap" hidden>
          <div class="step-label">Size</div>
          <div class="size-grid" id="sheet-sizes"></div>
        </div>

        <div class="step-label">Quantity</div>
        <div class="stepper">
          <button id="qty-minus">−</button>
          <span
            id="qty-count"
            style="min-width: 32px; text-align: center; font-weight: 500"
            >1</span
          >
          <button id="qty-plus">+</button>
        </div>

        <div class="step-label">Notes / allergies (optional)</div>
        <textarea
          id="sheet-note"
          placeholder="No onions, gluten-free, …"
        ></textarea>

        <div style="display: flex; gap: 8px; margin-top: 14px">
          <button
            class="cart-btn"
            style="
              flex: 1;
              background: var(--surface-3);
              color: var(--text);
              box-shadow: none;
            "
            id="sheet-cancel"
          >
            Cancel
          </button>
          <button class="cart-btn" style="flex: 2" id="sheet-add">
            Add to order — <span id="sheet-add-total">€0.00</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Cart review sheet -->
    <div class="sheet" id="cart-sheet" hidden>
      <div class="sheet-card" onclick="event.stopPropagation()">
        <div class="step-label">Your order</div>
        <div class="lines" id="cart-lines"></div>

        <div class="step-label">Send to the kitchen?</div>
        <p style="color: var(--text-muted); font-size: 13px; margin: 0 0 8px">
          Your waiter still handles payment. Tap below to send what's in the
          cart so they can start preparing.
        </p>
        <div id="cart-feedback"></div>
        <div style="display: flex; gap: 8px">
          <button
            class="cart-btn"
            style="
              flex: 1;
              background: var(--surface-3);
              color: var(--text);
              box-shadow: none;
            "
            id="cart-back"
          >
            Back
          </button>
          <button class="cart-btn" style="flex: 2" id="cart-send">
            Send to kitchen
          </button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var qs = new URLSearchParams(location.search);
        var tableId = qs.get("table") || qs.get("t");
        if (!tableId) {
          document.getElementById("loading").textContent =
            "No table specified. Please scan the QR code at your table again.";
          return;
        }

        var state = {
          menu: null,
          // Two-tier filter state. activeParent is "all" or a parent
          // category id; activeSub is "all" or a child id. Picking a
          // parent resets activeSub to "all" so the customer sees
          // everything in that section before drilling further.
          activeParent: "all",
          activeSub: "all",
          cart: [], // [{ itemId, name, price, qty, sizeLabel, note }]
          currency: "EUR",
          sheetItem: null,
          sheetSize: null,
          sheetQty: 1,
        };

        var elRestaurant = document.getElementById("restaurant");
        var elTitle = document.getElementById("title");
        var elMeta = document.getElementById("meta");
        var elLoading = document.getElementById("loading");
        var elContent = document.getElementById("content");
        var elCats = document.getElementById("cats");
        var elSubCats = document.getElementById("subcats");
        var elGrid = document.getElementById("grid");
        var elCart = document.getElementById("cart");
        var elCartCount = document.getElementById("cart-count");
        var elCartTotal = document.getElementById("cart-total");
        var elCartReview = document.getElementById("cart-review");

        var elItemSheet = document.getElementById("item-sheet");
        var elSheetName = document.getElementById("sheet-name");
        var elSheetPrice = document.getElementById("sheet-price");
        var elSheetSizesWrap = document.getElementById("sheet-sizes-wrap");
        var elSheetSizes = document.getElementById("sheet-sizes");
        var elSheetNote = document.getElementById("sheet-note");
        var elSheetCancel = document.getElementById("sheet-cancel");
        var elSheetAdd = document.getElementById("sheet-add");
        var elSheetAddTotal = document.getElementById("sheet-add-total");
        var elQtyMinus = document.getElementById("qty-minus");
        var elQtyPlus = document.getElementById("qty-plus");
        var elQtyCount = document.getElementById("qty-count");

        var elCartSheet = document.getElementById("cart-sheet");
        var elCartLines = document.getElementById("cart-lines");
        var elCartBack = document.getElementById("cart-back");
        var elCartSend = document.getElementById("cart-send");
        var elCartFeedback = document.getElementById("cart-feedback");

        function fmtMoney(n) {
          try {
            return new Intl.NumberFormat("en-IE", {
              style: "currency",
              currency: state.currency,
            }).format(Number(n) || 0);
          } catch {
            return "€" + (Number(n) || 0).toFixed(2);
          }
        }

        // ---- Customer-menu styling ----
        // Settings.customerMenu lands here as `style`. We apply it as
        // CSS-variable overrides + optional cover image / tagline /
        // heading font so the manager's chosen look reaches the guest.

        // Pulls an unsaved-style override from `#preview=<json>` —
        // used by the Settings page to live-preview tweaks before the
        // manager hits Save. Returns {} on any parse failure or when
        // the hash isn't present, so the caller can spread safely.
        function readPreviewOverride() {
          var m = (location.hash || "").match(/preview=([^&]+)/);
          if (!m) return {};
          try {
            return JSON.parse(decodeURIComponent(m[1])) || {};
          } catch (e) {
            return {};
          }
        }

        function applyStyle(style) {
          var root = document.documentElement;
          if (style.brandColor) root.style.setProperty("--brand", style.brandColor);
          if (style.accentColor) root.style.setProperty("--brand-bright", style.accentColor);

          // Mode override beats prefers-color-scheme. Sets the matching
          // palette regardless of the user's OS preference.
          if (style.mode === "light") {
            root.style.setProperty("--bg", "#f8fafc");
            root.style.setProperty("--surface", "#ffffff");
            root.style.setProperty("--surface-2", "#f1f5f9");
            root.style.setProperty("--surface-3", "#e2e8f0");
            root.style.setProperty("--border", "#e2e8f0");
            root.style.setProperty("--text", "#0f172a");
            root.style.setProperty("--text-muted", "#475569");
            root.style.setProperty("--text-dim", "#94a3b8");
          } else if (style.mode === "dark") {
            root.style.setProperty("--bg", "#141414");
            root.style.setProperty("--surface", "#1c1c1d");
            root.style.setProperty("--surface-2", "#232325");
            root.style.setProperty("--surface-3", "#2c2c2e");
            root.style.setProperty("--border", "rgba(255, 255, 255, 0.06)");
            root.style.setProperty("--text", "#f5f5f5");
            root.style.setProperty("--text-muted", "#a3a3a3");
            root.style.setProperty("--text-dim", "#737373");
          }

          // Optional Google Font for headings + body copy.
          if (style.headingFont && style.headingFont.trim()) {
            var fontName = style.headingFont.trim();
            var link = document.createElement("link");
            link.rel = "stylesheet";
            link.href =
              "https://fonts.googleapis.com/css2?family=" +
              encodeURIComponent(fontName.replace(/ /g, "+")) +
              ":wght@400;500;600;700&display=swap";
            document.head.appendChild(link);
            document.body.style.fontFamily =
              '"' + fontName + '", Inter, system-ui, sans-serif';
          }

          // Cover image — sits above the restaurant name.
          if (style.coverImageUrl) {
            var img = document.createElement("img");
            img.src = style.coverImageUrl;
            img.alt = "";
            img.style.cssText =
              "display:block;width:calc(100% + 32px);max-height:180px;object-fit:cover;margin:-16px -16px 12px;border-radius:0 0 14px 14px";
            var header = document.querySelector("header");
            if (header) header.insertBefore(img, header.firstChild);
          }

          // Tagline — small italic line under the restaurant name.
          if (style.tagline) {
            var tag = document.createElement("div");
            tag.textContent = style.tagline;
            tag.style.cssText =
              "font-size:13px;color:var(--text-muted);font-style:italic;margin-top:6px";
            elTitle.parentNode.insertBefore(tag, elTitle.nextSibling);
          }

          // Layout drives the .grid/.item CSS via a body data-attr.
          // CSS rules at the top of this file react accordingly.
          if (style.layout) {
            document.body.setAttribute("data-layout", style.layout);
          }
        }

        function load() {
          fetch("/api/public/menu/" + encodeURIComponent(tableId))
            .then(function (r) {
              if (!r.ok) throw new Error("Not found");
              return r.json();
            })
            .then(function (j) {
              state.menu = j;
              state.currency = j.restaurant.currency || "EUR";
              // The Settings page's "Preview" link drops the
              // in-progress customerMenu into the URL hash so the
              // manager can see unsaved edits without round-tripping
              // through Save. We merge it over the server response so
              // any field they didn't touch still uses the saved value.
              applyStyle(
                Object.assign({}, j.style || {}, readPreviewOverride())
              );
              elRestaurant.textContent = j.restaurant.name;
              elTitle.textContent = "Table " + j.table.label;
              elMeta.textContent =
                j.table.room + " · " + j.table.seats + " seats";
              renderCats();
              renderGrid();
              elLoading.hidden = true;
              elContent.hidden = false;
            })
            .catch(function () {
              elLoading.textContent =
                "Couldn\u2019t load the menu. Please ask your waiter for help.";
            });
        }
        load();

        // Pull parent and child categories out of the flat list. A
        // category with no parent is top-level (Food, Drinks); the
        // rest are children of one of those parents. Categories with
        // a parent that we don't know about are treated as top-level
        // — defensive against bad data.
        function getParents() {
          if (!state.menu) return [];
          var byId = {};
          state.menu.categories.forEach(function (c) { byId[c.id] = c; });
          return state.menu.categories.filter(function (c) {
            return !c.parent || !byId[c.parent];
          });
        }
        function getChildrenOf(parentId) {
          if (!state.menu) return [];
          return state.menu.categories.filter(function (c) {
            return c.parent === parentId;
          });
        }
        // Walk an item's category up to its top-level parent so the
        // parent filter ("Food") matches items whose direct category
        // is a child ("Mains"). Falls back to the item's own category
        // when it has no parent.
        function topLevelOf(catId) {
          if (!state.menu || !catId) return null;
          var byId = {};
          state.menu.categories.forEach(function (c) { byId[c.id] = c; });
          var c = byId[catId];
          if (!c) return null;
          if (!c.parent || !byId[c.parent]) return c.id;
          return c.parent;
        }

        function renderCats() {
          elCats.innerHTML = "";
          elCats.appendChild(mkParentBtn("all", "All"));
          getParents().forEach(function (p) {
            elCats.appendChild(mkParentBtn(p.id, p.name));
          });

          // Sub-row only appears when a specific parent is active and
          // it has children to drill into.
          var subs =
            state.activeParent === "all"
              ? []
              : getChildrenOf(state.activeParent);
          if (!subs.length) {
            elSubCats.hidden = true;
            elSubCats.innerHTML = "";
            return;
          }
          elSubCats.hidden = false;
          elSubCats.innerHTML = "";
          elSubCats.appendChild(mkSubBtn("all", "All"));
          subs.forEach(function (c) {
            elSubCats.appendChild(mkSubBtn(c.id, c.name));
          });
        }
        function mkParentBtn(id, label) {
          var btn = document.createElement("button");
          btn.className = "cat" + (state.activeParent === id ? " active" : "");
          btn.textContent = label;
          btn.addEventListener("click", function () {
            state.activeParent = id;
            state.activeSub = "all";
            renderCats();
            renderGrid();
          });
          return btn;
        }
        function mkSubBtn(id, label) {
          var btn = document.createElement("button");
          btn.className = "cat" + (state.activeSub === id ? " active" : "");
          btn.textContent = label;
          btn.addEventListener("click", function () {
            state.activeSub = id;
            renderCats();
            renderGrid();
          });
          return btn;
        }

        function renderGrid() {
          elGrid.innerHTML = "";
          var items = state.menu.items.filter(function (i) {
            if (!i.category) {
              return state.activeParent === "all";
            }
            // Sub-filter is most specific — match exactly when set.
            if (state.activeSub !== "all") {
              return i.category.id === state.activeSub;
            }
            // Otherwise fall back to the parent: include the item if
            // its category's top-level parent is the active parent
            // (covers "child of Food" and "is Food itself" cases).
            if (state.activeParent === "all") return true;
            return topLevelOf(i.category.id) === state.activeParent;
          });
          if (!items.length) {
            var empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "Nothing in this category right now.";
            empty.style.gridColumn = "1/-1";
            elGrid.appendChild(empty);
            return;
          }
          items.forEach(function (i) {
            var btn = document.createElement("button");
            btn.className = "item";
            btn.innerHTML =
              '<div class="cat-tag" style="color:' +
              ((i.category && i.category.color) || "var(--text-muted)") +
              '">' +
              (i.category ? i.category.name : "") +
              "</div>" +
              '<div class="item-name"></div>' +
              (i.description ? '<div class="item-desc"></div>' : "") +
              '<div class="item-price">' +
              fmtMoney(i.price) +
              "</div>";
            btn.querySelector(".item-name").textContent = i.name;
            if (i.description)
              btn.querySelector(".item-desc").textContent = i.description;
            btn.addEventListener("click", function () {
              openItemSheet(i);
            });
            elGrid.appendChild(btn);
          });
        }

        function openItemSheet(item) {
          state.sheetItem = item;
          state.sheetSize = (item.sizes && item.sizes[0]) || null;
          state.sheetQty = 1;
          elSheetName.textContent = item.name;
          elSheetPrice.textContent = fmtMoney(item.price);
          elSheetNote.value = "";
          if (item.sizes && item.sizes.length) {
            elSheetSizesWrap.hidden = false;
            elSheetSizes.innerHTML = "";
            item.sizes.forEach(function (s, idx) {
              var btn = document.createElement("button");
              btn.className = "size-btn" + (idx === 0 ? " active" : "");
              btn.innerHTML =
                "<div>" +
                s.label +
                '</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">' +
                (s.priceDelta > 0 ? "+" : "") +
                (s.priceDelta !== 0 ? fmtMoney(s.priceDelta) : "base") +
                "</div>";
              btn.addEventListener("click", function () {
                state.sheetSize = s;
                [].forEach.call(
                  elSheetSizes.querySelectorAll(".size-btn"),
                  function (b) {
                    b.classList.remove("active");
                  }
                );
                btn.classList.add("active");
                renderSheetTotal();
              });
              elSheetSizes.appendChild(btn);
            });
          } else {
            elSheetSizesWrap.hidden = true;
          }
          renderSheetQty();
          renderSheetTotal();
          elItemSheet.hidden = false;
        }
        function closeItemSheet() {
          elItemSheet.hidden = true;
          state.sheetItem = null;
        }
        function renderSheetQty() {
          elQtyCount.textContent = state.sheetQty;
        }
        function renderSheetTotal() {
          if (!state.sheetItem) return;
          var unit =
            state.sheetItem.price +
            (state.sheetSize ? Number(state.sheetSize.priceDelta) || 0 : 0);
          elSheetAddTotal.textContent = fmtMoney(unit * state.sheetQty);
        }
        elSheetCancel.addEventListener("click", closeItemSheet);
        elQtyMinus.addEventListener("click", function () {
          state.sheetQty = Math.max(1, state.sheetQty - 1);
          renderSheetQty();
          renderSheetTotal();
        });
        elQtyPlus.addEventListener("click", function () {
          state.sheetQty = Math.min(20, state.sheetQty + 1);
          renderSheetQty();
          renderSheetTotal();
        });
        elSheetAdd.addEventListener("click", function () {
          if (!state.sheetItem) return;
          var unit =
            state.sheetItem.price +
            (state.sheetSize ? Number(state.sheetSize.priceDelta) || 0 : 0);
          state.cart.push({
            itemId: state.sheetItem.id,
            name: state.sheetItem.name,
            sizeLabel: state.sheetSize ? state.sheetSize.label : null,
            qty: state.sheetQty,
            unitPrice: unit,
            note: (elSheetNote.value || "").trim(),
          });
          closeItemSheet();
          renderCart();
        });

        function renderCart() {
          var count = state.cart.reduce(function (a, c) {
            return a + c.qty;
          }, 0);
          var total = state.cart.reduce(function (a, c) {
            return a + c.qty * c.unitPrice;
          }, 0);
          elCart.hidden = count === 0;
          elCartCount.textContent = count;
          elCartTotal.textContent = fmtMoney(total);
        }
        elCartReview.addEventListener("click", function () {
          elCartLines.innerHTML = "";
          state.cart.forEach(function (l, idx) {
            var div = document.createElement("div");
            div.className = "line";
            div.innerHTML =
              "<div><div>" +
              l.name +
              (l.sizeLabel ? " · " + l.sizeLabel : "") +
              "</div>" +
              (l.note
                ? '<div style="color:var(--text-muted);font-size:12px;margin-top:2px">"' +
                  l.note +
                  '"</div>'
                : "") +
              "</div>" +
              '<div style="display:flex;align-items:center;gap:8px"><span class="qty-pill">×' +
              l.qty +
              "</span>" +
              '<span style="font-weight:500">' +
              fmtMoney(l.qty * l.unitPrice) +
              "</span>" +
              '<button style="background:transparent;border:0;color:var(--text-muted);font-size:18px;cursor:pointer" data-i="' +
              idx +
              '" title="Remove">×</button></div>';
            div
              .querySelector("button[data-i]")
              .addEventListener("click", function (e) {
                var i = Number(e.currentTarget.dataset.i);
                state.cart.splice(i, 1);
                renderCart();
                if (!state.cart.length) elCartSheet.hidden = true;
                else elCartReview.click();
              });
            elCartLines.appendChild(div);
          });
          elCartSheet.hidden = false;
        });
        elCartBack.addEventListener("click", function () {
          elCartSheet.hidden = true;
        });
        elCartSend.addEventListener("click", function () {
          if (!state.cart.length) return;
          elCartFeedback.innerHTML = "";
          elCartSend.disabled = true;
          elCartSend.textContent = "Sending…";
          fetch("/api/public/menu/" + encodeURIComponent(tableId) + "/order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lines: state.cart.map(function (l) {
                return {
                  itemId: l.itemId,
                  qty: l.qty,
                  sizeLabel: l.sizeLabel,
                  note: l.note,
                };
              }),
            }),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                if (!r.ok) throw new Error((j && j.error) || "Failed");
                return j;
              });
            })
            .then(function () {
              elCartFeedback.innerHTML =
                '<div class="feedback ok">Sent to the kitchen. Your waiter is on the way.</div>';
              state.cart = [];
              renderCart();
              setTimeout(function () {
                elCartSheet.hidden = true;
              }, 1800);
            })
            .catch(function (e) {
              elCartFeedback.innerHTML =
                '<div class="feedback error">' +
                (e.message || "Could not send order") +
                "</div>";
            })
            .finally(function () {
              elCartSend.disabled = false;
              elCartSend.textContent = "Send to kitchen";
            });
        });
      })();
    </script>
  </body>
</html>
