<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bestel aan tafel</title>
    <style>
      /*
    Customer QR ordering — the page a guest lands on after scanning the
    QR pinned to their table. Self-contained vanilla JS, dark theme by
    default with prefers-color-scheme awareness. URL contract:

      /order.html?table=<TABLE_ID>

    The page fetches /api/public/menu/:tableId for the menu, lets the
    customer build a cart, and POSTs to .../order to push pending lines
    to the kitchen. The waiter still finalises payment.
  */
      :root {
        --bg: #141414;
        --surface: #1c1c1d;
        --surface-2: #232325;
        --surface-3: #2c2c2e;
        --border: rgba(255, 255, 255, 0.06);
        --text: #f5f5f5;
        --text-muted: #a3a3a3;
        --text-dim: #737373;
        --brand: #ea580c;
        --brand-bright: #fb923c;
        --shadow: 0 12px 32px -12px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --surface: #fff;
          --surface-2: #f1f5f9;
          --surface-3: #e2e8f0;
          --border: #e2e8f0;
          --text: #0f172a;
          --text-muted: #475569;
          --text-dim: #94a3b8;
          /* Light cards look cleaner flat — the lifted-card look only
             reads well on the dark palette. */
          --shadow: none;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.5;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px 16px 120px;
      }
      header {
        padding: 8px 0 16px;
      }
      .restaurant {
        font-size: 13px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      h1 {
        font-size: 22px;
        font-weight: 500;
        margin: 4px 0;
      }
      .table-meta {
        font-size: 13px;
        color: var(--text-muted);
      }

      .cats {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 8px 0;
        margin: 0 -16px 0;
        padding-left: 16px;
        padding-right: 16px;
      }
      .cats.parents {
        border-bottom: 1px solid var(--border);
      }
      /* Sub-row sits flush under the parents row, slightly smaller chips
         so the hierarchy is obvious at a glance. */
      .cats.subs {
        margin-bottom: 16px;
        border-bottom: 1px solid var(--border);
        padding-top: 4px;
        padding-bottom: 10px;
      }
      .cats.subs[hidden] { display: none; }
      .cat {
        flex-shrink: 0;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      .cats.subs .cat {
        padding: 5px 10px;
        font-size: 12px;
        background: var(--surface-2);
      }
      .cat.active {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }

      .grid {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 1fr;
      }
      @media (min-width: 640px) {
        .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      .item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        cursor: pointer;
        text-align: left;
        box-shadow: var(--shadow);
        transition: filter 0.15s, transform 0.05s;
      }

      /* ── Layout: list ───────────────────────────────────────────
         Single-column wider cards. More room for descriptions, price
         a little larger — long-form menu feel. */
      body[data-layout="list"] .grid {
        grid-template-columns: 1fr;
      }
      @media (min-width: 640px) {
        body[data-layout="list"] .grid {
          grid-template-columns: 1fr;
        }
      }
      body[data-layout="list"] .item { padding: 14px 16px; }
      body[data-layout="list"] .item .item-price { font-size: 16px; }

      /* ── Layout: magazine ───────────────────────────────────────
         Default look. Two-column card grid on phones (single column
         on the smallest screens). Each card has the product photo on
         the left, copy on the right (name, description, price), a
         circular + button overlapping the photo's bottom-right and
         an optional info disc top-right that opens a webpage inside
         the in-app iframe sheet. Inspired by the reference mock-ups
         for "Popular Wine" cards. */
      body[data-layout="magazine"] .grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 379px) {
        body[data-layout="magazine"] .grid {
          grid-template-columns: 1fr;
        }
      }
      @media (min-width: 720px) {
        body[data-layout="magazine"] .grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      body[data-layout="magazine"] .item {
        position: relative;
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 10px;
        align-items: stretch;
        padding: 12px 14px 12px 10px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: none;
        cursor: default;
        overflow: visible;
      }
      body[data-layout="magazine"] .item:hover { filter: none; background: var(--surface-2); }
      body[data-layout="magazine"] .item:active { transform: none; }
      body[data-layout="magazine"] .cat-tag { display: none; }
      body[data-layout="magazine"] .item-body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
        min-width: 0;
        padding-right: 2px;
      }
      body[data-layout="magazine"] .item-name {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.25;
        margin: 0;
        color: var(--text);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      body[data-layout="magazine"] .item-desc {
        font-size: 12px;
        color: var(--text-muted);
        margin: 2px 0 0;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      body[data-layout="magazine"] .item-price {
        margin-top: 6px;
        font-size: 15px;
        font-weight: 700;
        color: var(--brand);
      }
      /* Photo well — sits flush left, slightly inset top/bottom so the
         + and info buttons can extend past it without clipping. */
      body[data-layout="magazine"] .item-photo {
        position: relative;
        width: 96px;
        height: 110px;
        flex-shrink: 0;
        align-self: stretch;
      }
      body[data-layout="magazine"] .item-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
        background: var(--surface);
      }
      /* Placeholder disc when the manager hasn't uploaded a photo
         yet — kept tasteful so empty rows still feel intentional. */
      body[data-layout="magazine"] .item-photo .ph {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        background:
          radial-gradient(circle at 30% 25%, rgba(255,255,255,0.07), transparent 65%),
          linear-gradient(135deg, var(--surface), var(--surface-3));
        display: grid;
        place-items: center;
        color: var(--text-dim);
      }
      body[data-layout="magazine"] .add-btn {
        position: absolute;
        right: -8px;
        bottom: -8px;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 18px;
        line-height: 1;
        display: grid;
        place-items: center;
        cursor: pointer;
        box-shadow: 0 6px 16px -6px rgba(0, 0, 0, 0.35);
        transition: transform 0.05s ease, background 0.15s ease;
        z-index: 2;
      }
      body[data-layout="magazine"] .add-btn:active { transform: scale(0.92); }
      body[data-layout="magazine"] .add-btn:hover {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
      }
      /* Info disc — small "i" in the card's top-right when the item
         has an infoUrl. Opens the in-app iframe sheet. */
      body[data-layout="magazine"] .info-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        display: grid;
        place-items: center;
        cursor: pointer;
        z-index: 2;
        transition: color 0.15s ease, background 0.15s ease;
      }
      body[data-layout="magazine"] .info-btn:hover {
        color: var(--brand);
        background: var(--surface);
      }
      body[data-layout="magazine"] .info-btn svg { width: 14px; height: 14px; }

      /* ── In-app iframe sheet ───────────────────────────────────
         Tapping the info disc on a card opens this full-height sheet.
         Matches the cart sheet visually so the embed feels native. */
      .info-sheet {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: stretch;
        justify-content: center;
        z-index: 60;
      }
      .info-sheet[hidden] { display: none; }
      .info-sheet-card {
        width: 100%;
        max-width: 720px;
        background: var(--bg);
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .info-sheet-head {
        flex-shrink: 0;
        padding: 12px 14px env(safe-area-inset-top);
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .info-sheet-head .back {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        display: grid;
        place-items: center;
        cursor: pointer;
      }
      .info-sheet-head .meta {
        flex: 1;
        min-width: 0;
      }
      .info-sheet-head .title {
        font-weight: 600;
        font-size: 15px;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }
      .info-sheet-head .host {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: lowercase;
        letter-spacing: 0.04em;
        margin-top: 2px;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }
      .info-sheet-head .ext {
        flex-shrink: 0;
        text-decoration: none;
        color: var(--text-muted);
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        font-size: 12px;
        font-weight: 500;
      }
      .info-sheet-body {
        flex: 1;
        position: relative;
        overflow-y: auto;
        background: var(--bg);
      }
      .info-card {
        padding: 0 0 28px;
      }
      .info-hero {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: var(--surface-2);
        object-fit: cover;
        display: block;
      }
      .info-hero.placeholder {
        display: grid;
        place-items: center;
        color: var(--text-dim);
      }
      .info-meta {
        padding: 18px 18px 0;
      }
      .info-card .heading {
        font-size: 20px;
        font-weight: 600;
        line-height: 1.25;
        margin: 0 0 6px;
        color: var(--text);
      }
      .info-card .site {
        font-size: 12px;
        text-transform: lowercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .info-card .rating {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text);
        font-size: 13px;
      }
      .info-card .rating .stars {
        color: #f5b301;
        letter-spacing: 1px;
        font-size: 15px;
      }
      .info-card .description {
        margin: 14px 0 0;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
      }
      .info-card .open-cta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin: 20px 18px 0;
        padding: 11px 18px;
        border-radius: 12px;
        background: var(--brand);
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
      }
      .info-state {
        padding: 40px 24px;
        text-align: center;
        color: var(--text-muted);
        font-size: 14px;
      }
      .info-state.error strong { color: var(--text); display: block; margin-bottom: 6px; }
      .info-state a.cta {
        display: inline-block;
        margin-top: 14px;
        padding: 10px 16px;
        border-radius: 12px;
        background: var(--brand);
        color: #fff;
        text-decoration: none;
        font-weight: 500;
      }
      .info-skeleton {
        padding: 0 0 28px;
      }
      .info-skeleton .bar {
        background: linear-gradient(90deg, var(--surface-2) 0%, var(--surface-3) 50%, var(--surface-2) 100%);
        background-size: 200% 100%;
        border-radius: 6px;
        animation: shimmer 1.4s infinite;
      }
      .info-skeleton .hero { aspect-ratio: 16 / 9; border-radius: 0; }
      .info-skeleton .lines { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
      .info-skeleton .lines .bar.h { height: 16px; }
      .info-skeleton .lines .bar.l { height: 11px; width: 80%; }
      .info-skeleton .lines .bar.m { height: 11px; width: 60%; }
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Search bar — always visible, sits above the item rows. */
      .search-wrap {
        position: relative;
        margin: 0 0 14px;
      }
      .search-wrap input.search {
        width: 100%;
        padding: 11px 14px 11px 38px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
        font-size: 14px;
      }
      .search-wrap input.search::placeholder {
        color: var(--text-dim);
      }
      .search-wrap .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-dim);
        pointer-events: none;
      }

      /* ── Layout: compact ────────────────────────────────────────
         Edge-to-edge dense rows with hairline dividers — printed-
         menu feel. Hides the category badge per row, tightens the
         padding, drops the card chrome entirely. */
      body[data-layout="compact"] .grid {
        grid-template-columns: 1fr;
        gap: 0;
      }
      @media (min-width: 640px) {
        body[data-layout="compact"] .grid {
          grid-template-columns: 1fr;
        }
      }
      body[data-layout="compact"] .item {
        border-radius: 0;
        border: 0;
        border-bottom: 1px solid var(--border);
        box-shadow: none;
        padding: 10px 12px;
      }
      body[data-layout="compact"] .item:hover { filter: none; background: var(--surface-2); }
      body[data-layout="compact"] .cat-tag { display: none; }
      body[data-layout="compact"] .item-name { font-size: 14px; margin-top: 0; }
      body[data-layout="compact"] .item-desc { font-size: 11px; margin-top: 2px; }
      body[data-layout="compact"] .item-price { margin-top: 4px; font-size: 14px; }
      .item:active {
        transform: scale(0.98);
      }
      .item:hover {
        filter: brightness(1.03);
      }
      .cat-tag {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
      }
      .item-name {
        font-weight: 500;
        margin-top: 2px;
        color: white;
      }
      .item-price {
        color: var(--brand-bright);
        font-weight: 500;
        margin-top: 6px;
      }
      .item-desc {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .cart {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        box-shadow: 0 -12px 40px -12px rgba(0, 0, 0, 0.5);
        padding: 12px 16px env(safe-area-inset-bottom);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .cart-meta {
        color: var(--text-muted);
        font-size: 13px;
      }
      .cart-total {
        font-weight: 500;
        color: var(--text);
      }
      .cart-btn {
        background: var(--brand);
        color: #fff;
        border: 0;
        padding: 11px 18px;
        border-radius: 12px;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 8px 24px -10px rgba(234, 88, 12, 0.55);
      }
      .cart-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .sheet {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        z-index: 50;
      }
      .sheet[hidden] {
        display: none;
      }
      .sheet-card {
        width: 100%;
        max-width: 520px;
        background: var(--surface);
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
        padding: 18px 18px env(safe-area-inset-bottom);
        max-height: 90vh;
        overflow-y: auto;
      }
      .sheet-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .sheet-row + .sheet-row {
        margin-top: 10px;
      }
      .stepper {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .stepper button {
        width: 32px;
        height: 32px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font-size: 16px;
        cursor: pointer;
      }
      .step-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin: 12px 0 6px;
      }
      textarea,
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        font: inherit;
        font-size: 14px;
      }
      textarea {
        resize: vertical;
        min-height: 60px;
      }
      .size-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .size-btn {
        padding: 9px 6px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text);
        cursor: pointer;
        font-size: 13px;
        text-align: center;
      }
      .size-btn.active {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }

      .lines {
        background: var(--surface-2);
        border-radius: 12px;
        padding: 4px 0;
      }
      .line {
        padding: 8px 12px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        font-size: 14px;
      }
      .line + .line {
        border-top: 1px solid var(--border);
      }
      .qty-pill {
        background: var(--surface-3);
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .empty {
        text-align: center;
        color: var(--text-dim);
        padding: 60px 16px;
      }
      .feedback {
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 10px;
      }
      .feedback.error {
        background: rgba(248, 113, 113, 0.12);
        color: #f87171;
      }
      .feedback.ok {
        background: rgba(52, 211, 153, 0.12);
        color: #34d399;
      }

      /* Discreet NL/FR/EN segmented control in the header so a
         francophone or English-speaking guest can switch without the
         operator having to do anything. NL is the default. */
      .lang-switch {
        display: inline-flex;
        gap: 2px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }
      .lang-switch button {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        padding: 4px 9px;
        border-radius: 999px;
        cursor: pointer;
        font: inherit;
      }
      .lang-switch button.active {
        background: var(--surface);
        color: var(--text);
      }
      .header-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="wrap">
      <header>
        <div class="header-row">
          <div style="min-width:0; flex:1">
            <div class="restaurant" id="restaurant">…</div>
            <h1 id="title">Bestel</h1>
            <div class="table-meta" id="meta"></div>
          </div>
          <div class="lang-switch" id="lang-switch" role="group" aria-label="Language">
            <button type="button" data-lang="nl">NL</button>
            <button type="button" data-lang="fr">FR</button>
            <button type="button" data-lang="en">EN</button>
          </div>
        </div>
      </header>

      <div id="loading" class="empty">Menu laden…</div>

      <div id="content" hidden>
        <div class="cats parents" id="cats"></div>
        <div class="cats subs" id="subcats" hidden></div>
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

        };
        var qs = new URLSearchParams(location.search);
        var lang = (function detectLang() {
          var fromUrl = (qs.get("lang") || "").toLowerCase();
          if (SUPPORTED.indexOf(fromUrl) !== -1) return fromUrl;
          try {
            var saved = localStorage.getItem(I18N_KEY);
            if (saved && SUPPORTED.indexOf(saved) !== -1) return saved;
          } catch (e) { /* ignore */ }
          var nav = (navigator.language || "").toLowerCase();
          if (nav.indexOf("nl") === 0) return "nl";
          // Belgium-first default — even fr/en browsers land on NL
          // unless they explicitly switch.
          return "nl";
        })();
        function t(key, vars) {
          var dict = TRANSLATIONS[lang] || TRANSLATIONS.nl;
          var s = dict[key];
          if (s === undefined) s = (TRANSLATIONS.en && TRANSLATIONS.en[key]) || key;
          if (vars && typeof s === "string") {
            for (var v in vars) {
              s = s.replace(new RegExp("\\{" + v + "\\}", "g"), String(vars[v]));
            }
          }
          return s;
        }
        function applyStaticI18n() {
          // Walks data-i18n + data-i18n-placeholder attributes.
          document.querySelectorAll("[data-i18n]").forEach(function (el) {
            el.textContent = t(el.getAttribute("data-i18n"));
          });
          document.querySelectorAll("[data-i18n-placeholder]").forEach(function (el) {
            el.placeholder = t(el.getAttribute("data-i18n-placeholder"));
          });
          document.documentElement.setAttribute("lang", lang);
          document.title = t("order.title");
          // Header / static UI
          var search = document.getElementById("search");
          if (search) search.placeholder = t("order.searchPlaceholder");
          var cartLabel = document.getElementById("cart-count-label");
          if (cartLabel) cartLabel.textContent = t("order.cart.label");
          var cartReview = document.getElementById("cart-review");
          if (cartReview) cartReview.innerHTML = t("order.cart.review");
          var titleH = document.getElementById("title");
          // Only seed the header when no real table label has loaded yet.
          if (titleH && titleH.dataset.tableLabel === undefined) {
            titleH.textContent = t("order.titleH");
          }
        }
        function setLang(next) {
          if (SUPPORTED.indexOf(next) === -1) return;
          lang = next;
          try { localStorage.setItem(I18N_KEY, next); } catch (e) {}
          applyStaticI18n();
          updateLangSwitch();
          // renderCats/renderGrid are declared later in this same
          // IIFE; they'll exist by the time the user clicks. Guard
          // anyway so applyStaticI18n still works on cold load.
          try {
            if (state && state.menu) { renderCats(); renderGrid(); }
          } catch (e) { /* not yet ready */ }
        }
        function updateLangSwitch() {
          var sw = document.getElementById("lang-switch");
          if (!sw) return;
          sw.querySelectorAll("button[data-lang]").forEach(function (b) {
            if (b.getAttribute("data-lang") === lang) b.classList.add("active");
            else b.classList.remove("active");
          });
        }
        document.addEventListener("DOMContentLoaded", function () {
          var sw = document.getElementById("lang-switch");
          if (sw) {
            sw.addEventListener("click", function (e) {
              var b = e.target.closest("button[data-lang]");
              if (!b) return;
              setLang(b.getAttribute("data-lang"));
            });
          }
          applyStaticI18n();
          updateLangSwitch();
        });

        // already shows in the right language for slow networks.

          // category id; activeSub is "all" or a child id. Picking a
          // parent resets activeSub to "all" so the customer sees
          // everything in that section before drilling further.
          activeParent: "all",
          activeSub: "all",

        // the "i" disc on a card. We call the backend /unfurl
        // endpoint to fetch OpenGraph / Twitter / JSON-LD metadata
        // for the destination URL and render it natively. This
        // sidesteps X-Frame-Options / CSP frame-ancestors entirely
        // and keeps the look consistent with the rest of the menu.
        var elInfoSheet = document.getElementById("info-sheet");
        var elInfoBody = document.getElementById("info-body");
        var elInfoTitle = document.getElementById("info-title");
        var elInfoHost = document.getElementById("info-host");
        var elInfoExt = document.getElementById("info-ext");
        var elInfoBack = document.getElementById("info-back");
        var infoReqToken = 0;

        function closeInfoSheet() {
          elInfoSheet.hidden = true;
          elInfoBody.innerHTML = "";
          infoReqToken += 1; // invalidate any in-flight fetch
        }

        function escapeHTML(s) {
          return String(s == null ? "" : s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function renderStars(value, best) {
          var max = Number(best) || 5;
          var v = Math.max(0, Math.min(max, Number(value) || 0));
          // Convert to a 5-star scale for display, regardless of the
          // source's `bestRating` (Untappd uses 5; some sites use 10).
          var ratio = v / max;
          var full = Math.floor(ratio * 5);
          var half = ratio * 5 - full >= 0.5 ? 1 : 0;
          var empty = 5 - full - half;
          return (
            "★".repeat(full) +
            (half ? "☆" : "") +
            "☆".repeat(Math.max(0, empty - (half ? 0 : 0)))
          );
        }

        function infoSkeleton() {
          return (
            '<div class="info-skeleton">' +
            '  <div class="bar hero"></div>' +
            '  <div class="lines">' +
            '    <div class="bar h"></div>' +
            '    <div class="bar l"></div>' +
            '    <div class="bar m"></div>' +
            '  </div>' +
            "</div>"
          );
        }

        function infoErrorState(url) {
          return (
            '<div class="info-state error">' +
            '  <strong>' + escapeHTML(t("info.error.title")) + '</strong>' +
            '  ' + escapeHTML(t("info.error.body")) +
            '  <br/><a class="cta" href="' + escapeHTML(url) + '" target="_blank" rel="noopener noreferrer">' + escapeHTML(t("info.openTab")) + '</a>' +
            "</div>"

        }

        function renderInfoCard(data, fallbackTitle, fallbackUrl) {
          var title = data.title || fallbackTitle || "";
          var image = data.image || "";
          var desc = data.description || "";
          var site = data.siteName || data.host || "";
          var openUrl = data.url || fallbackUrl;
          var ratingHtml = "";
          if (data.rating) {
            var stars = renderStars(data.rating, data.ratingBest || 5);

              '<div class="rating">' +
              '<span class="stars">' + escapeHTML(stars) + "</span>" +
              "<span>" + escapeHTML(String(data.rating)) +
              (data.ratingBest ? " / " + escapeHTML(String(data.ratingBest)) : "") +
              (data.ratingCount ? " · " + escapeHTML(String(data.ratingCount)) + " " + escapeHTML(t("info.ratings")) : "") +
              "</span>" +
              "</div>";
          }
          var noImg = t("info.noImage");
          var heroHtml = image
            ? '<img class="info-hero" src="' + escapeHTML(image) + '" alt="" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'info-hero placeholder\',textContent:' + JSON.stringify(noImg) + '}))" />'
            : '<div class="info-hero placeholder">' + escapeHTML(noImg) + '</div>';

          return (
            '<div class="info-card">' +
            heroHtml +
            '<div class="info-meta">' +
            '<h2 class="heading">' + escapeHTML(title) + "</h2>" +
            (site ? '<div class="site">' + escapeHTML(site) + "</div>" : "") +
            ratingHtml +
            (desc ? '<p class="description">' + escapeHTML(desc) + "</p>" : "") +
            "</div>" +
            '<a class="open-cta" href="' + escapeHTML(openUrl) + '" target="_blank" rel="noopener noreferrer">' + escapeHTML(t("info.readMore", { host: data.host || site || t("info.readMore.fallback") })) + '</a>' +
            "</div>"
          );
        }

        function openInfoSheet(item) {
          if (!item || !item.infoUrl) return;
          var url = item.infoUrl;
          var host = "";
          try { host = new URL(url, location.origin).host; } catch (e) { host = ""; }
          elInfoTitle.textContent = item.name || t("info.title.fallback");
          elInfoHost.textContent = host;
          elInfoExt.href = url;
          elInfoBody.innerHTML = infoSkeleton();
          elInfoSheet.hidden = false;

          // Issue + track the request so a quick close-then-reopen
          // doesn't paint stale data.
          infoReqToken += 1;
          var token = infoReqToken;
          fetch("/api/public/unfurl?url=" + encodeURIComponent(url))
            .then(function (r) {
              if (!r.ok) throw new Error("HTTP " + r.status);
              return r.json();
            })
            .then(function (data) {
              if (token !== infoReqToken) return; // user closed/reopened
              if (!data || data.ok === false) {
                elInfoBody.innerHTML = infoErrorState(url);
                return;
              }
              elInfoBody.innerHTML = renderInfoCard(data, item.name, url);
            })
            .catch(function () {
              if (token !== infoReqToken) return;
              elInfoBody.innerHTML = infoErrorState(url);
            });
        }

        function fmtMoney(n) {
          try {
            return new Intl.NumberFormat("en-IE", {
              style: "currency",

            }).format(Number(n) || 0);
          } catch {
            return "€" + (Number(n) || 0).toFixed(2);

        // ---- Customer-menu styling ----
        // Settings.customerMenu lands here as `style`. We apply it as
        // CSS-variable overrides + optional cover image / tagline /
        // heading font so the manager's chosen look reaches the guest.

        // Pulls an unsaved-style override from `#preview=<json>` —
        // used by the Settings page to live-preview tweaks before the
        // manager hits Save. Returns {} on any parse failure or when
        // the hash isn't present, so the caller can spread safely.
        function readPreviewOverride() {
          var m = (location.hash || "").match(/preview=([^&]+)/);
          if (!m) return {};
          try {
            return JSON.parse(decodeURIComponent(m[1])) || {};
          } catch (e) {
            return {};
          }
        }

        function applyStyle(style) {
          var root = document.documentElement;
          if (style.brandColor) root.style.setProperty("--brand", style.brandColor);
          if (style.accentColor) root.style.setProperty("--brand-bright", style.accentColor);

          // Mode override beats prefers-color-scheme. Sets the matching
          // palette regardless of the user's OS preference.
          if (style.mode === "light") {
            root.style.setProperty("--bg", "#f8fafc");
            root.style.setProperty("--surface", "#ffffff");
            root.style.setProperty("--surface-2", "#f1f5f9");
            root.style.setProperty("--surface-3", "#e2e8f0");
            root.style.setProperty("--border", "#e2e8f0");
            root.style.setProperty("--text", "#0f172a");
            root.style.setProperty("--text-muted", "#475569");
            root.style.setProperty("--text-dim", "#94a3b8");
            // Light cards look cleaner flat — keep .item shadows off
            // when the manager has explicitly picked the light palette.
            root.style.setProperty("--shadow", "none");
          } else if (style.mode === "dark") {
            root.style.setProperty("--bg", "#141414");
            root.style.setProperty("--surface", "#1c1c1d");
            root.style.setProperty("--surface-2", "#232325");
            root.style.setProperty("--surface-3", "#2c2c2e");
            root.style.setProperty("--border", "rgba(255, 255, 255, 0.06)");
            root.style.setProperty("--text", "#f5f5f5");
            root.style.setProperty("--text-muted", "#a3a3a3");
            root.style.setProperty("--text-dim", "#737373");
            // Restore the lifted-card shadow if a previous style
            // (e.g. live preview) had switched it off.
            root.style.setProperty(
              "--shadow",
              "0 12px 32px -12px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.05)"
            );
          }

          // Optional Google Font for headings + body copy.
          if (style.headingFont && style.headingFont.trim()) {
            var fontName = style.headingFont.trim();
            var link = document.createElement("link");
            link.rel = "stylesheet";
            link.href =
              "https://fonts.googleapis.com/css2?family=" +
              encodeURIComponent(fontName.replace(/ /g, "+")) +
              ":wght@400;500;600;700&display=swap";
            document.head.appendChild(link);
            document.body.style.fontFamily =
              '"' + fontName + '", Inter, system-ui, sans-serif';
          }

          // Cover image — sits above the restaurant name.
          if (style.coverImageUrl) {
            var img = document.createElement("img");
            img.src = style.coverImageUrl;
            img.alt = "";
            img.style.cssText =
              "display:block;width:calc(100% + 32px);max-height:180px;object-fit:cover;margin:-16px -16px 12px;border-radius:0 0 14px 14px";
            var header = document.querySelector("header");
            if (header) header.insertBefore(img, header.firstChild);
          }

          // Tagline — small italic line under the restaurant name.
          if (style.tagline) {
            var tag = document.createElement("div");
            tag.textContent = style.tagline;
            tag.style.cssText =
              "font-size:13px;color:var(--text-muted);font-style:italic;margin-top:6px";
            elTitle.parentNode.insertBefore(tag, elTitle.nextSibling);
          }

          // Layout drives the .grid/.item CSS via a body data-attr.
          // CSS rules at the top of this file react accordingly.
          // 'magazine' is the new default — explicit fallback so the
          // body always carries a layout attribute the renderer can
          // branch on.
          document.body.setAttribute("data-layout", style.layout || "magazine");
        }

        function load() {
          fetch("/api/public/menu/" + encodeURIComponent(tableId))
            .then(function (r) {
              if (!r.ok) throw new Error("Not found");
              return r.json();
            })
            .then(function (j) {
              state.menu = j;
              state.currency = j.restaurant.currency || "EUR";
              // The Settings page's "Preview" link drops the
              // in-progress customerMenu into the URL hash so the
              // manager can see unsaved edits without round-tripping
              // through Save. We merge it over the server response so
              // any field they didn't touch still uses the saved value.
              applyStyle(
                Object.assign({}, j.style || {}, readPreviewOverride())
              );
              elRestaurant.textContent = j.restaurant.name;
              elTitle.textContent = "Table " + j.table.label;
              elMeta.textContent =
                j.table.room + " · " + j.table.seats + " seats";
              renderCats();
              renderGrid();
              elLoading.hidden = true;
              elContent.hidden = false;
            })
            .catch(function () {
              elLoading.textContent = t("order.error");
            });
        }
        load();

        // Pull parent and child categories out of the flat list. A
        // category with no parent is top-level (Food, Drinks); the
        // rest are children of one of those parents. Categories with
        // a parent that we don't know about are treated as top-level
        // — defensive against bad data.
        function getParents() {
          if (!state.menu) return [];
          var byId = {};
          state.menu.categories.forEach(function (c) { byId[c.id] = c; });
          return state.menu.categories.filter(function (c) {
            return !c.parent || !byId[c.parent];
          });
        }
        function getChildrenOf(parentId) {
          if (!state.menu) return [];
          return state.menu.categories.filter(function (c) {
            return c.parent === parentId;
          });
        }
        // Walk an item's category up to its top-level parent so the
        // parent filter ("Food") matches items whose direct category
        // is a child ("Mains"). Falls back to the item's own category
        // when it has no parent.
        function topLevelOf(catId) {
          if (!state.menu || !catId) return null;
          var byId = {};
          state.menu.categories.forEach(function (c) { byId[c.id] = c; });
          var c = byId[catId];
          if (!c) return null;
          if (!c.parent || !byId[c.parent]) return c.id;
          return c.parent;
        }

        function renderCats() {
          elCats.innerHTML = "";
          elCats.appendChild(mkParentBtn("all", t("order.cats.all")));
          getParents().forEach(function (p) {
            elCats.appendChild(mkParentBtn(p.id, p.name));
          });

          // Sub-row only appears when a specific parent is active and
          // it has children to drill into.
          var subs =
            state.activeParent === "all"
              ? []
              : getChildrenOf(state.activeParent);
          if (!subs.length) {
            elSubCats.hidden = true;
            elSubCats.innerHTML = "";
            return;
          }
          elSubCats.hidden = false;
          elSubCats.innerHTML = "";
          elSubCats.appendChild(mkSubBtn("all", t("order.cats.all")));
          subs.forEach(function (c) {
            elSubCats.appendChild(mkSubBtn(c.id, c.name));
          });
        }
        function mkParentBtn(id, label) {
          var btn = document.createElement("button");
          btn.className = "cat" + (state.activeParent === id ? " active" : "");
          btn.textContent = label;
          btn.addEventListener("click", function () {
            state.activeParent = id;
            state.activeSub = "all";
            renderCats();
            renderGrid();
          });
          return btn;
        }
        function mkSubBtn(id, label) {
          var btn = document.createElement("button");
          btn.className = "cat" + (state.activeSub === id ? " active" : "");
          btn.textContent = label;
          btn.addEventListener("click", function () {
            state.activeSub = id;
            renderCats();
            renderGrid();
          });
          return btn;
        }

        function renderGrid() {
          elGrid.innerHTML = "";
          var q = (state.searchQ || "").trim().toLowerCase();
          var items = state.menu.items.filter(function (i) {
            // Category filter — sub is most specific, else parent.
            if (i.category) {
              if (state.activeSub !== "all") {
                if (i.category.id !== state.activeSub) return false;
              } else if (state.activeParent !== "all") {
                if (topLevelOf(i.category.id) !== state.activeParent) return false;
              }
            } else if (state.activeParent !== "all") {
              return false;
            }
            // Free-text search — name + description.
            if (q) {
              var hay =
                (i.name || "").toLowerCase() +
                " " +
                (i.description || "").toLowerCase();
              if (hay.indexOf(q) === -1) return false;
            }
            return true;
          });
          if (!items.length) {
            var empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = q
              ? t("order.empty.search", { q: state.searchQ })
              : t("order.empty.category");
            empty.style.gridColumn = "1/-1";
            elGrid.appendChild(empty);
            return;
          }

          var layout = document.body.getAttribute("data-layout") || "magazine";
          if (layout === "magazine") {
            items.forEach(function (i) {
              elGrid.appendChild(renderMagazineRow(i));
            });
          } else {
            items.forEach(function (i) {
              elGrid.appendChild(renderCardItem(i));
            });
          }
        }

        // Magazine row — title + description + price on the left, a
        // square photo with a circular + button on the right. Tapping
        // the row title opens the same item sheet as the + button so
        // notes/sizes are still reachable.
        function renderMagazineRow(i) {
          var row = document.createElement("div");
          row.className = "item";

          var body = document.createElement("div");
          body.className = "item-body";

          var name = document.createElement("div");
          name.className = "item-name";
          name.textContent = i.name;
          body.appendChild(name);

          if (i.description) {
            var desc = document.createElement("div");
            desc.className = "item-desc";
            desc.textContent = i.description;
            body.appendChild(desc);
          }

          var price = document.createElement("div");
          price.className = "item-price";
          price.textContent = fmtMoney(i.price);
          body.appendChild(price);

          row.appendChild(body);

          var photo = document.createElement("div");
          photo.className = "item-photo";
          if (i.imageUrl) {
            var img = document.createElement("img");
            img.src = i.imageUrl;
            img.alt = "";
            img.loading = "lazy";
            img.addEventListener("error", function () {
              // Fall back to the placeholder disc if the URL 404s.
              img.replaceWith(buildPhotoPlaceholder());
            });
            photo.appendChild(img);
          } else {
            photo.appendChild(buildPhotoPlaceholder());
          }

          var add = document.createElement("button");
          add.className = "add-btn";
          add.type = "button";
          add.setAttribute("aria-label", "Add " + i.name);
          add.textContent = "+";
          add.addEventListener("click", function (e) {
            e.stopPropagation();
            openItemSheet(i);
          });
          photo.appendChild(add);
          row.appendChild(photo);

          // Optional info disc — top-right of the card, only when an
          // info URL is set. Opens the in-app webpage sheet so the
          // customer can read the Untappd page / tasting notes /
          // recipe without leaving the menu.
          if (i.infoUrl) {
            var info = document.createElement("button");
            info.className = "info-btn";
            info.type = "button";
            info.setAttribute("aria-label", t("info.title.fallback") + " — " + i.name);
            info.innerHTML =
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
              '<circle cx="12" cy="12" r="9" />' +
              '<line x1="12" y1="11" x2="12" y2="16" />' +
              '<circle cx="12" cy="8" r="0.6" fill="currentColor" />' +
              "</svg>";
            info.addEventListener("click", function (e) {
              e.stopPropagation();
              openInfoSheet(i);
            });
            row.appendChild(info);
          }

          // Tapping the title area opens the order sheet — convenience.
          body.addEventListener("click", function () { openItemSheet(i); });
          body.style.cursor = "pointer";
          return row;
        }

        function buildPhotoPlaceholder() {
          var ph = document.createElement("div");
          ph.className = "ph";
          // Lightweight cutlery glyph so the placeholder reads as
          // "food/drink" rather than a missing-image icon.
          ph.innerHTML =
            '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
            '<path d="M5 3v18M3 3h4v8H3z" />' +
            '<path d="M19 3l-3 6v3h3v9" />' +
            "</svg>";
          return ph;
        }

        // Legacy card item — used by the grid / list / compact layouts.
        function renderCardItem(i) {
          var btn = document.createElement("button");
          btn.className = "item";
          btn.innerHTML =
            '<div class="cat-tag" style="color:' +
            ((i.category && i.category.color) || "var(--text-muted)") +
            '">' +
            (i.category ? i.category.name : "") +
            "</div>" +
            '<div class="item-name"></div>' +
            (i.description ? '<div class="item-desc"></div>' : "") +
            '<div class="item-price">' +
            fmtMoney(i.price) +
            "</div>";
          btn.querySelector(".item-name").textContent = i.name;
          if (i.description)
            btn.querySelector(".item-desc").textContent = i.description;
          btn.addEventListener("click", function () {
            openItemSheet(i);
          });
          return btn;
        }

        function openItemSheet(item) {
          state.sheetItem = item;
          state.sheetSize = (item.sizes && item.sizes[0]) || null;
          state.sheetQty = 1;
          elSheetName.textContent = item.name;
          elSheetPrice.textContent = fmtMoney(item.price);
          elSheetNote.value = "";
          if (item.sizes && item.sizes.length) {
            elSheetSizesWrap.hidden = false;
            elSheetSizes.innerHTML = "";
            item.sizes.forEach(function (s, idx) {
              var btn = document.createElement("button");
              btn.className = "size-btn" + (idx === 0 ? " active" : "");
              btn.innerHTML =
                "<div>" +
                s.label +
                '</div><div style="font-size:11px;color:var(--text-muted);margin-top:2px">' +
                (s.priceDelta > 0 ? "+" : "") +
                (s.priceDelta !== 0 ? fmtMoney(s.priceDelta) : "base") +
                "</div>";
              btn.addEventListener("click", function () {
                state.sheetSize = s;
                [].forEach.call(
                  elSheetSizes.querySelectorAll(".size-btn"),
                  function (b) {
                    b.classList.remove("active");
                  }
                );
                btn.classList.add("active");
                renderSheetTotal();
              });
              elSheetSizes.appendChild(btn);
            });
          } else {
            elSheetSizesWrap.hidden = true;
          }
          renderSheetQty();
          renderSheetTotal();
          elItemSheet.hidden = false;
        }
        function closeItemSheet() {
          elItemSheet.hidden = true;
          state.sheetItem = null;
        }
        function renderSheetQty() {
          elQtyCount.textContent = state.sheetQty;
        }
        function renderSheetTotal() {
          if (!state.sheetItem) return;
          var unit =
            state.sheetItem.price +
            (state.sheetSize ? Number(state.sheetSize.priceDelta) || 0 : 0);
          elSheetAddTotal.textContent = fmtMoney(unit * state.sheetQty);
        }
        elSheetCancel.addEventListener("click", closeItemSheet);
        elQtyMinus.addEventListener("click", function () {
          state.sheetQty = Math.max(1, state.sheetQty - 1);
          renderSheetQty();
          renderSheetTotal();
        });
        elQtyPlus.addEventListener("click", function () {
          state.sheetQty = Math.min(20, state.sheetQty + 1);
          renderSheetQty();
          renderSheetTotal();
        });
        elSheetAdd.addEventListener("click", function () {
          if (!state.sheetItem) return;
          var unit =
            state.sheetItem.price +
            (state.sheetSize ? Number(state.sheetSize.priceDelta) || 0 : 0);
          state.cart.push({
            itemId: state.sheetItem.id,
            name: state.sheetItem.name,
            sizeLabel: state.sheetSize ? state.sheetSize.label : null,
            qty: state.sheetQty,
            unitPrice: unit,
            note: (elSheetNote.value || "").trim(),
          });
          closeItemSheet();
          renderCart();
        });

        function renderCart() {
          var count = state.cart.reduce(function (a, c) {
            return a + c.qty;
          }, 0);
          var total = state.cart.reduce(function (a, c) {
            return a + c.qty * c.unitPrice;
          }, 0);
          elCart.hidden = count === 0;
          elCartCount.textContent = count;
          elCartTotal.textContent = fmtMoney(total);
        }
        elCartReview.addEventListener("click", function () {
          elCartLines.innerHTML = "";
          state.cart.forEach(function (l, idx) {
            var div = document.createElement("div");
            div.className = "line";
            div.innerHTML =
              "<div><div>" +
              l.name +
              (l.sizeLabel ? " · " + l.sizeLabel : "") +
              "</div>" +
              (l.note
                ? '<div style="color:var(--text-muted);font-size:12px;margin-top:2px">"' +
                  l.note +
                  '"</div>'
                : "") +
              "</div>" +
              '<div style="display:flex;align-items:center;gap:8px"><span class="qty-pill">×' +
              l.qty +
              "</span>" +
              '<span style="font-weight:500">' +
              fmtMoney(l.qty * l.unitPrice) +
              "</span>" +
              '<button style="background:transparent;border:0;color:var(--text-muted);font-size:18px;cursor:pointer" data-i="' +
              idx +
              '" title="Remove">×</button></div>';
            div
              .querySelector("button[data-i]")
              .addEventListener("click", function (e) {
                var i = Number(e.currentTarget.dataset.i);
                state.cart.splice(i, 1);
                renderCart();
                if (!state.cart.length) elCartSheet.hidden = true;
                else elCartReview.click();
              });
            elCartLines.appendChild(div);
          });
          elCartSheet.hidden = false;
        });
        elCartBack.addEventListener("click", function () {
          elCartSheet.hidden = true;
        });
        elCartSend.addEventListener("click", function () {
          if (!state.cart.length) return;
          elCartFeedback.innerHTML = "";
          elCartSend.disabled = true;
          elCartSend.textContent = "Sending…";
          fetch("/api/public/menu/" + encodeURIComponent(tableId) + "/order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lines: state.cart.map(function (l) {
                return {
                  itemId: l.itemId,
                  qty: l.qty,
                  sizeLabel: l.sizeLabel,
                  note: l.note,
                };
              }),
            }),
          })
            .then(function (r) {
              return r.json().then(function (j) {
                if (!r.ok) throw new Error((j && j.error) || "Failed");
                return j;
              });
            })
            .then(function () {
              elCartFeedback.innerHTML =
                '<div class="feedback ok">Sent to the kitchen. Your waiter is on the way.</div>';
              state.cart = [];
              renderCart();
              setTimeout(function () {
                elCartSheet.hidden = true;
              }, 1800);
            })
            .catch(function (e) {
              elCartFeedback.innerHTML =
                '<div class="feedback error">' +
                (e.message || "Could not send order") +
                "</div>";
            })
            .finally(function () {
              elCartSend.disabled = false;
              elCartSend.textContent = "Send to kitchen";
            });
        });
      })();
    </script>
  </body>
</html>
